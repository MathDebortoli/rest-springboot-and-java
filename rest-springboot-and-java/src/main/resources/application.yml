spring:
  application:
    name: rest-springboot-and-java

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rest_springboot_and_java?useTimezone=true&serverTimezone=UTC
    username: root
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  jackson:
    mapper:
      sort-properties-alphabetically: false

  flyway:
    enabled: false
    locations: classpath:db/migration

logging:
  level:
    root: info